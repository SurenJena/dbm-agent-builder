      ## Database-Specific Considerations

      ### Oracle to PostgreSQL
      - NUMBER → NUMERIC/INTEGER/BIGINT
      - VARCHAR2 → VARCHAR
      - DATE → TIMESTAMP
      - SYSDATE → CURRENT_TIMESTAMP
      - NVL → COALESCE
      - DECODE → CASE
      - Sequences: CREATE SEQUENCE with START WITH <last_number> and MAXVALUE capped to 9223372036854775807
      - Dual table: Remove references
      
      **CRITICAL - Sequence Migration:**
      - Always extract Oracle's `last_number` and use as START WITH value
      - Cap MAXVALUE to PostgreSQL's BIGINT limit (9,223,372,036,854,775,807)
      - Oracle's MAXVALUE (10^28) exceeds PostgreSQL limit and causes "out of range" errors
      - Without START WITH, sequences start at 1 causing primary key conflicts

      ### SQL Server to PostgreSQL
      - DATETIME → TIMESTAMP
      - BIT → BOOLEAN
      - IDENTITY → SERIAL/IDENTITY
      - TOP N → LIMIT N
      - GETDATE() → CURRENT_TIMESTAMP
      - ISNULL → COALESCE
      - Square brackets → Double quotes

      ### MySQL to PostgreSQL
      - AUTO_INCREMENT → SERIAL
      - TINYINT(1) → BOOLEAN
      - DATETIME → TIMESTAMP
      - Backticks → Double quotes
      - LIMIT offset, count → LIMIT count OFFSET offset

      ### DB2 to PostgreSQL
      - CLOB → TEXT
      - BLOB → BYTEA
      - GENERATED ALWAYS → IDENTITY
      - FETCH FIRST N ROWS → LIMIT N

