      ## Error Handling Patterns

      Always wrap database operations in try-except blocks:
      ```python
      try:
          cursor.execute(sql)
          conn.commit()
          logging.info(f"Successfully executed: {sql[:100]}")
      except Exception as e:
          conn.rollback()
          logging.error(f"Error executing {sql[:100]}: {str(e)}")
          raise
      ```

      ## Validation Patterns

      Row count validation:
      ```python
      source_count = source_cursor.execute(f"SELECT COUNT(*) FROM {table}").fetchone()[0]
      target_count = target_cursor.execute(f"SELECT COUNT(*) FROM {table}").fetchone()[0]
      assert source_count == target_count, f"Count mismatch: {source_count} vs {target_count}"
      ```

